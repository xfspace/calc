<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice iPad</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@200;300;400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–bg: #0a0a0f;
–surface: #13131a;
–surface2: #1c1c26;
–btn-dark: #1e1e2a;
–btn-op: #ff6b35;
–btn-func: #2a2a3a;
–btn-num: #22222e;
–text-primary: #f0f0f5;
–text-muted: #6b6b8a;
–accent: #ff6b35;
–accent2: #ff9f6b;
–glow: rgba(255, 107, 53, 0.15);
–border: rgba(255,255,255,0.06);
}

html, body {
width: 100%; height: 100%;
background: var(–bg);
display: flex;
align-items: center;
justify-content: center;
font-family: ‘DM Mono’, monospace;
overflow: hidden;
}

/* iPad Frame */
.ipad-frame {
width: 600px;
height: 840px;
background: #1a1a1f;
border-radius: 40px;
box-shadow:
0 0 0 2px #2a2a35,
0 0 0 4px #111116,
0 60px 120px rgba(0,0,0,0.8),
0 0 80px rgba(255,107,53,0.05);
position: relative;
overflow: hidden;
display: flex;
flex-direction: column;
align-items: center;
}

/* iPad hardware details */
.ipad-frame::before {
content: ‘’;
position: absolute;
top: 18px;
left: 50%;
transform: translateX(-50%);
width: 80px;
height: 5px;
background: #2a2a35;
border-radius: 3px;
z-index: 10;
}

.camera-dot {
position: absolute;
top: 16px;
right: 80px;
width: 9px;
height: 9px;
background: #1e1e25;
border-radius: 50%;
border: 1.5px solid #2a2a35;
z-index: 10;
}

.side-btn {
position: absolute;
background: #222230;
border-radius: 3px;
}
.side-btn.power { right: -5px; top: 100px; width: 5px; height: 60px; }
.side-btn.vol1  { left: -5px; top: 130px; width: 5px; height: 40px; }
.side-btn.vol2  { left: -5px; top: 185px; width: 5px; height: 40px; }
.side-btn.mute  { left: -5px; top: 100px; width: 5px; height: 22px; }

/* Screen */
.screen {
width: 540px;
flex: 1;
margin-top: 48px;
background: var(–surface);
border-radius: 28px;
overflow: hidden;
display: flex;
flex-direction: column;
position: relative;
}

/* Status bar */
.status-bar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 14px 24px 0;
color: var(–text-primary);
font-size: 11px;
font-weight: 500;
letter-spacing: 0.05em;
opacity: 0.8;
}

.status-time { font-size: 13px; font-weight: 600; }
.status-icons { display: flex; gap: 6px; align-items: center; }
.battery {
width: 22px; height: 11px;
border: 1.5px solid currentColor;
border-radius: 2.5px;
position: relative;
opacity: 0.9;
}
.battery::after {
content: ‘’;
position: absolute;
right: -5px; top: 50%;
transform: translateY(-50%);
width: 3px; height: 5px;
background: currentColor;
border-radius: 0 1px 1px 0;
}
.battery-fill {
position: absolute;
left: 2px; top: 2px; bottom: 2px;
width: 70%;
background: #4ade80;
border-radius: 1px;
}
.wifi-icon { font-size: 13px; }

/* App header */
.app-header {
padding: 8px 24px 0;
display: flex;
align-items: center;
justify-content: space-between;
}
.app-title {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
font-weight: 500;
color: var(–text-muted);
letter-spacing: 0.2em;
text-transform: uppercase;
}
.history-btn {
font-size: 18px;
color: var(–text-muted);
cursor: pointer;
opacity: 0.7;
transition: opacity 0.2s;
background: none;
border: none;
}
.history-btn:hover { opacity: 1; }

/* Display */
.display {
flex: 1;
display: flex;
flex-direction: column;
justify-content: flex-end;
padding: 0 28px 20px;
min-height: 180px;
}
.expression {
color: var(–text-muted);
font-size: 16px;
font-weight: 300;
text-align: right;
min-height: 24px;
letter-spacing: 0.05em;
transition: all 0.2s;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.result {
color: var(–text-primary);
font-size: 68px;
font-weight: 200;
text-align: right;
line-height: 1;
letter-spacing: -2px;
transition: all 0.15s ease;
overflow: hidden;
text-overflow: ellipsis;
white-space: nowrap;
}
.result.small { font-size: 46px; letter-spacing: -1px; }
.result.tiny  { font-size: 34px; letter-spacing: 0; }

/* Separator */
.separator {
height: 1px;
background: var(–border);
margin: 0 20px;
}

/* History panel */
.history-panel {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: var(–surface2);
z-index: 50;
transform: translateY(100%);
transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
border-radius: 28px;
padding: 24px;
display: flex;
flex-direction: column;
gap: 12px;
}
.history-panel.open { transform: translateY(0); }
.history-title {
font-size: 11px;
font-weight: 500;
color: var(–text-muted);
letter-spacing: 0.2em;
text-transform: uppercase;
display: flex;
justify-content: space-between;
align-items: center;
}
.history-close {
cursor: pointer;
color: var(–accent);
font-size: 13px;
background: none;
border: none;
font-family: inherit;
letter-spacing: 0.1em;
}
.history-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.history-item {
padding: 14px 16px;
border-radius: 12px;
cursor: pointer;
transition: background 0.15s;
border-bottom: 1px solid var(–border);
}
.history-item:hover { background: var(–btn-dark); }
.history-expr { font-size: 13px; color: var(–text-muted); margin-bottom: 4px; }
.history-res  { font-size: 22px; color: var(–text-primary); font-weight: 300; text-align: right; }
.history-empty { color: var(–text-muted); font-size: 14px; text-align: center; margin-top: 40px; opacity: 0.5; }

/* Keypad */
.keypad {
padding: 16px 20px 24px;
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
}

.btn {
height: 70px;
border-radius: 18px;
border: none;
cursor: pointer;
font-family: ‘DM Mono’, monospace;
font-size: 22px;
font-weight: 400;
color: var(–text-primary);
transition: all 0.1s ease;
position: relative;
overflow: hidden;
outline: none;
letter-spacing: -0.5px;
}

.btn::after {
content: ‘’;
position: absolute;
inset: 0;
background: rgba(255,255,255,0);
transition: background 0.1s;
border-radius: inherit;
}
.btn:active::after { background: rgba(255,255,255,0.08); }
.btn:active { transform: scale(0.95); }

.btn-num {
background: var(–btn-num);
box-shadow: 0 2px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04);
}
.btn-func {
background: var(–btn-func);
font-size: 18px;
color: #a0a0c0;
box-shadow: 0 2px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
}
.btn-op {
background: linear-gradient(145deg, var(–accent), #e85a20);
color: #fff;
font-size: 26px;
box-shadow: 0 4px 12px rgba(255,107,53,0.3), 0 2px 0 rgba(0,0,0,0.2);
}
.btn-op:hover {
box-shadow: 0 6px 20px rgba(255,107,53,0.45), 0 2px 0 rgba(0,0,0,0.2);
}
.btn-zero {
grid-column: span 2;
text-align: left;
padding-left: 30px;
font-size: 22px;
}
.btn-eq {
background: linear-gradient(145deg, #ff8c5a, var(–accent));
color: #fff;
font-size: 28px;
box-shadow: 0 4px 16px rgba(255,107,53,0.4), 0 2px 0 rgba(0,0,0,0.2);
}

/* Special func label */
.btn-func .sup { font-size: 10px; vertical-align: super; }

/* Scientific row */
.sci-row {
padding: 0 20px 4px;
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
}
.btn-sci {
height: 46px;
border-radius: 14px;
border: none;
cursor: pointer;
font-family: ‘DM Mono’, monospace;
font-size: 13px;
font-weight: 400;
color: #8888aa;
background: rgba(255,255,255,0.03);
border: 1px solid var(–border);
transition: all 0.1s;
letter-spacing: -0.3px;
}
.btn-sci:hover { background: rgba(255,255,255,0.06); color: var(–text-primary); }
.btn-sci:active { transform: scale(0.95); background: rgba(255,255,255,0.04); }

/* Home indicator */
.home-indicator {
width: 100px;
height: 4px;
background: rgba(255,255,255,0.15);
border-radius: 2px;
margin: 10px auto;
}

/* Ripple effect */
@keyframes ripple {
to { transform: scale(4); opacity: 0; }
}
.ripple-dot {
position: absolute;
border-radius: 50%;
background: rgba(255,255,255,0.15);
width: 30px; height: 30px;
transform: scale(0);
animation: ripple 0.4s ease-out;
pointer-events: none;
}

/* Pulse animation for result */
@keyframes pulse-result {
0% { opacity: 0.7; transform: scale(0.97); }
100% { opacity: 1; transform: scale(1); }
}
.result.pulse { animation: pulse-result 0.15s ease-out; }

/* Scrollbar */
.history-list::-webkit-scrollbar { width: 3px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }
</style>

</head>

<script>
  // State
  let display = '0';
  let expression = '';
  let operand1 = null;
  let operator = null;
  let waitingForOperand = false;
  let justCalculated = false;
  let history = [];

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('clock').textContent = h + ':' + m;
  }
  updateClock();
  setInterval(updateClock, 10000);

  function updateDisplay() {
    let val = display;
    // Format number with spaces
    if (!isNaN(val) && val !== '' && !val.includes('Infinity') && !val.includes('NaN')) {
      let parts = val.split('.');
      parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      val = parts.join('.');
    }
    resultEl.textContent = val;
    // Size adaptation
    resultEl.className = 'result';
    if (val.length > 12) resultEl.classList.add('tiny');
    else if (val.length > 8) resultEl.classList.add('small');
    // Pulse
    resultEl.classList.add('pulse');
    setTimeout(() => resultEl.classList.remove('pulse'), 150);
  }

  function num(n) {
    if (justCalculated) {
      display = n;
      expression = '';
      justCalculated = false;
    } else if (waitingForOperand) {
      display = n;
      waitingForOperand = false;
    } else {
      display = display === '0' ? n : display + n;
    }
    updateDisplay();
  }

  function decimal() {
    if (waitingForOperand) { display = '0.'; waitingForOperand = false; }
    else if (!display.includes('.')) display += '.';
    updateDisplay();
  }

  function op(o) {
    const curr = parseFloat(display.replace(/ /g,''));
    if (operator && !waitingForOperand) {
      const result = calculate(operand1, curr, operator);
      display = String(result);
      expression = String(result) + ' ' + o;
      operand1 = result;
    } else {
      operand1 = curr;
      expression = display + ' ' + o;
    }
    operator = o;
    waitingForOperand = true;
    justCalculated = false;
    exprEl.textContent = expression;
    updateDisplay();
  }

  function calculate(a, b, op) {
    switch(op) {
      case '+': return round(a + b);
      case '−': return round(a - b);
      case '×': return round(a * b);
      case '÷': return b !== 0 ? round(a / b) : 'Erreur';
    }
  }

  function round(n) {
    return Math.round(n * 1e10) / 1e10;
  }

  function equals() {
    if (!operator || waitingForOperand) return;
    const curr = parseFloat(display.replace(/ /g,''));
    const expr = expression + ' ' + display;
    const result = calculate(operand1, curr, operator);
    // Save to history
    history.unshift({ expr: expr + ' =', result: String(result) });
    if (history.length > 30) history.pop();
    updateHistoryUI();

    display = String(result);
    exprEl.textContent = expr + ' =';
    operator = null;
    operand1 = null;
    waitingForOperand = false;
    justCalculated = true;
    updateDisplay();
  }

  function clearAll() {
    display = '0';
    expression = '';
    operator = null;
    operand1 = null;
    waitingForOperand = false;
    justCalculated = false;
    exprEl.textContent = '';
    updateDisplay();
  }

  function toggleSign() {
    display = String(parseFloat(display.replace(/ /g,'')) * -1);
    updateDisplay();
  }

  function percent() {
    display = String(parseFloat(display.replace(/ /g,'')) / 100);
    updateDisplay();
  }

  function sciOp(fn) {
    const val = parseFloat(display.replace(/ /g,''));
    let result;
    switch(fn) {
      case 'sin': result = round(Math.sin(val * Math.PI / 180)); break;
      case 'cos': result = round(Math.cos(val * Math.PI / 180)); break;
      case 'tan': result = round(Math.tan(val * Math.PI / 180)); break;
      case 'ln':  result = val > 0 ? round(Math.log(val)) : 'Erreur'; break;
      case 'sqrt': result = val >= 0 ? round(Math.sqrt(val)) : 'Erreur'; break;
      case 'sq':  result = round(val * val); break;
    }
    exprEl.textContent = fn + '(' + display + ') =';
    history.unshift({ expr: fn + '(' + display + ') =', result: String(result) });
    updateHistoryUI();
    display = String(result);
    justCalculated = true;
    operator = null;
    updateDisplay();
  }

  function insertConst(c) {
    const val = c === 'Math.PI' ? Math.PI : Math.E;
    display = String(round(val));
    waitingForOperand = false;
    updateDisplay();
  }

  // History
  function toggleHistory() {
    document.getElementById('historyPanel').classList.toggle('open');
  }

  function updateHistoryUI() {
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      list.innerHTML = '<div class="history-empty">Aucun calcul enregistré</div>';
      return;
    }
    list.innerHTML = history.map((h, i) => `
      <div class="history-item" onclick="recallHistory(${i})">
        <div class="history-expr">${h.expr}</div>
        <div class="history-res">${h.result}</div>
      </div>
    `).join('');
  }

  function recallHistory(i) {
    display = history[i].result;
    justCalculated = true;
    operator = null;
    exprEl.textContent = history[i].expr;
    updateDisplay();
    toggleHistory();
  }

  // Ripple effect on buttons
  document.querySelectorAll('.btn, .btn-sci').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const dot = document.createElement('div');
      dot.className = 'ripple-dot';
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left - 15;
      const y = e.clientY - rect.top - 15;
      dot.style.left = x + 'px';
      dot.style.top  = y + 'px';
      this.appendChild(dot);
      setTimeout(() => dot.remove(), 400);
    });
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') num(e.key);
    else if (e.key === '.') decimal();
    else if (e.key === '+') op('+');
    else if (e.key === '-') op('−');
    else if (e.key === '*') op('×');
    else if (e.key === '/') { e.preventDefault(); op('÷'); }
    else if (e.key === 'Enter' || e.key === '=') equals();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') {
      if (display.length > 1) { display = display.slice(0,-1); updateDisplay(); }
      else { display = '0'; updateDisplay(); }
    }
  });

  updateDisplay();
</script>
