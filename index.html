<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculatrice iPad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --btn-func: #2a2a3a;
    --btn-num: #22222e;
    --text-primary: #f0f0f5;
    --text-muted: #6b6b8a;
    --accent: #ff6b35;
    --border: rgba(255,255,255,0.06);
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    overflow: hidden;
  }
  .calculator {
    width: 100vw;
    height: 100vh;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  .display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 28px 20px;
  }
  .expression {
    color: var(--text-muted);
    font-size: 18px;
    text-align: right;
    min-height: 28px;
  }
  .result {
    color: var(--text-primary);
    font-size: 80px;
    font-weight: 200;
    text-align: right;
    line-height: 1;
    letter-spacing: -2px;
  }
  .result.small { font-size: 54px; }
  .result.tiny  { font-size: 38px; }
  .separator { height: 1px; background: var(--border); margin: 0 20px; }
  .sci-row {
    padding: 12px 16px 4px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn-sci {
    height: 50px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: #8888aa;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
  }
  .btn-sci:active { opacity: 0.7; transform: scale(0.95); }
  .keypad {
    padding: 12px 16px 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .btn {
    height: 78px;
    border-radius: 18px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 400;
    color: var(--text-primary);
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.93); opacity: 0.8; }
  .btn-num  { background: #22222e; }
  .btn-func { background: #2a2a3a; font-size: 20px; color: #a0a0c0; }
  .btn-op   { background: linear-gradient(145deg, #ff6b35, #e85a20); color: #fff; font-size: 28px; }
  .btn-eq   { background: linear-gradient(145deg, #ff8c5a, #ff6b35); color: #fff; font-size: 30px; }
  .btn-zero { grid-column: span 2; text-align: left; padding-left: 30px; }
</style>
</head>
<body>
<div class="calculator">
  <div class="display">
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="separator"></div>
  <div class="sci-row">
    <button class="btn-sci" onclick="sciOp('sin')">sin</button>
    <button class="btn-sci" onclick="sciOp('cos')">cos</button>
    <button class="btn-sci" onclick="sciOp('sqrt')">√</button>
    <button class="btn-sci" onclick="sciOp('sq')">x²</button>
    <button class="btn-sci" onclick="sciOp('tan')">tan</button>
    <button class="btn-sci" onclick="sciOp('ln')">ln</button>
    <button class="btn-sci" onclick="insertConst('Math.PI')">π</button>
    <button class="btn-sci" onclick="insertConst('Math.E')">e</button>
  </div>
  <div class="keypad">
    <button class="btn btn-func" onclick="clearAll()">AC</button>
    <button class="btn btn-func" onclick="toggleSign()">+/−</button>
    <button class="btn btn-func" onclick="percent()">%</button>
    <button class="btn btn-op"  onclick="op('÷')">÷</button>
    <button class="btn btn-num" onclick="num('7')">7</button>
    <button class="btn btn-num" onclick="num('8')">8</button>
    <button class="btn btn-num" onclick="num('9')">9</button>
    <button class="btn btn-op"  onclick="op('×')">×</button>
    <button class="btn btn-num" onclick="num('4')">4</button>
    <button class="btn btn-num" onclick="num('5')">5</button>
    <button class="btn btn-num" onclick="num('6')">6</button>
    <button class="btn btn-op"  onclick="op('−')">−</button>
    <button class="btn btn-num" onclick="num('1')">1</button>
    <button class="btn btn-num" onclick="num('2')">2</button>
    <button class="btn btn-num" onclick="num('3')">3</button>
    <button class="btn btn-op"  onclick="op('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="num('0')">0</button>
    <button class="btn btn-num" onclick="decimal()">.</button>
    <button class="btn btn-eq"  onclick="equals()">=</button>
  </div>
</div>
<script>
  let display='0', expression='', operand1=null, operator=null, waitingForOperand=false, justCalculated=false;
  const resultEl=document.getElementById('result');
  const exprEl=document.getElementById('expression');

  function updateDisplay() {
    let val=display;
    if(!isNaN(val)&&val!==''&&!val.includes('Infinity')) {
      let parts=val.split('.');
      parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');
      val=parts.join('.');
    }
    resultEl.textContent=val;
    resultEl.className='result';
    if(val.length>12) resultEl.classList.add('tiny');
    else if(val.length>8) resultEl.classList.add('small');
  }

  function num(n) {
    if(justCalculated){display=n;expression='';justCalculated=false;}
    else if(waitingForOperand){display=n;waitingForOperand=false;}
    else display=display==='0'?n:display+n;
    updateDisplay();
  }
  function decimal() {
    if(waitingForOperand){display='0.';waitingForOperand=false;}
    else if(!display.includes('.')) display+='.';
    updateDisplay();
  }
  function op(o) {
    const curr=parseFloat(display.replace(/ /g,''));
    if(operator&&!waitingForOperand){
      const r=calculate(operand1,curr,operator);
      display=String(r);operand1=r;
    } else operand1=curr;
    operator=o;expression=display+' '+o;
    waitingForOperand=true;justCalculated=false;
    exprEl.textContent=expression;updateDisplay();
  }
  function calculate(a,b,op) {
    const r={'+':a+b,'−':a-b,'×':a*b,'÷':b!==0?a/b:'Erreur'}[op];
    return typeof r==='number'?Math.round(r*1e10)/1e10:r;
  }
  function equals() {
    if(!operator||waitingForOperand) return;
    const curr=parseFloat(display.replace(/ /g,''));
    const r=calculate(operand1,curr,operator);
    exprEl.textContent=expression+' '+display+' =';
    display=String(r);operator=null;operand1=null;
    waitingForOperand=false;justCalculated=true;updateDisplay();
  }
  function clearAll(){display='0';expression='';operator=null;operand1=null;waitingForOperand=false;justCalculated=false;exprEl.textContent='';updateDisplay();}
  function toggleSign(){display=String(parseFloat(display.replace(/ /g,''))*-1);updateDisplay();}
  function percent(){display=String(parseFloat(display.replace(/ /g,''))/100);updateDisplay();}
  function sciOp(fn) {
    const val=parseFloat(display.replace(/ /g,''));
    const ops={sin:Math.sin(val*Math.PI/180),cos:Math.cos(val*Math.PI/180),tan:Math.tan(val*Math.PI/180),ln:val>0?Math.log(val):'Erreur',sqrt:val>=0?Math.sqrt(val):'Erreur',sq:val*val};
    const r=ops[fn];
    display=String(typeof r==='number'?Math.round(r*1e10)/1e10:r);
    exprEl.textContent=fn+'('+val+') =';justCalculated=true;operator=null;updateDisplay();
  }
  function insertConst(c){display=String(Math.round((c==='Math.PI'?Math.PI:Math.E)*1e10)/1e10);updateDisplay();}
  updateDisplay();
</script>
</body>
</html>
