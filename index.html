<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculatrice</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calculatrice">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --btn-num: #22222e;
    --btn-func: #2a2a3a;
    --btn-op: #ff6b35;
    --text-primary: #f0f0f5;
    --text-muted: #6b6b8a;
    --border: rgba(255,255,255,0.06);
  }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'DM Mono', monospace;
    overflow: hidden;
    color: var(--text-primary);
  }
  .calculator {
    width: 100vw;
    height: 100vh;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }

  /* HISTORY PANEL */
  .history-panel {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0f0f18;
    z-index: 100;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    display: flex;
    flex-direction: column;
    padding: 60px 24px 40px;
    gap: 16px;
  }
  .history-panel.open { transform: translateY(0); }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-title {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .history-close {
    background: var(--btn-op);
    border: none;
    color: #fff;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
  }
  .history-list {
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .history-item {
    padding: 16px;
    border-radius: 14px;
    background: #1a1a25;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .history-item:active { opacity: 0.7; }
  .history-expr { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .history-res  { font-size: 26px; font-weight: 300; text-align: right; color: var(--text-primary); }
  .history-empty { color: var(--text-muted); text-align: center; margin-top: 60px; font-size: 15px; opacity: 0.5; }
  .history-clear {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 12px;
    border-radius: 14px;
    cursor: pointer;
    letter-spacing: 0.1em;
  }

  /* DISPLAY */
  .display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 28px 16px;
    position: relative;
  }
  .history-btn {
    position: absolute;
    top: 20px; right: 24px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 20px;
    width: 42px; height: 42px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .history-btn:active { opacity: 0.6; }
  .expression {
    color: var(--text-muted);
    font-size: 18px;
    text-align: right;
    min-height: 28px;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result {
    color: var(--text-primary);
    font-size: 80px;
    font-weight: 200;
    text-align: right;
    line-height: 1;
    letter-spacing: -2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: font-size 0.1s;
  }
  .result.small { font-size: 54px; letter-spacing: -1px; }
  .result.tiny  { font-size: 36px; letter-spacing: 0; }

  .separator { height: 1px; background: var(--border); margin: 0 16px; }

  /* SCIENTIFIC ROW */
  .sci-row {
    padding: 12px 16px 6px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn-sci {
    height: 48px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: #8888aa;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn-sci:active { background: rgba(255,255,255,0.08); color: var(--text-primary); transform: scale(0.95); }

  /* KEYPAD */
  .keypad {
    padding: 10px 16px 50px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .btn {
    height: 76px;
    border-radius: 18px;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 400;
    color: var(--text-primary);
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn:active { transform: scale(0.93); opacity: 0.75; }
  .btn-num  { background: var(--btn-num); }
  .btn-func { background: var(--btn-func); font-size: 20px; color: #a0a0c0; }
  .btn-op   {
    background: linear-gradient(145deg, #ff6b35, #e85a20);
    color: #fff;
    font-size: 28px;
    box-shadow: 0 4px 14px rgba(255,107,53,0.35);
  }
  .btn-eq   {
    background: linear-gradient(145deg, #ff8c5a, #ff6b35);
    color: #fff;
    font-size: 30px;
    box-shadow: 0 4px 14px rgba(255,107,53,0.4);
  }
  .btn-zero {
    grid-column: span 2;
    text-align: left;
    padding-left: 28px;
  }
</style>
</head>
<body>

<!-- History Panel -->
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">Historique</span>
    <button class="history-close" onclick="toggleHistory()">Fermer ✕</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty">Aucun calcul enregistré</div>
  </div>
  <button class="history-clear" onclick="clearHistory()">Effacer l'historique</button>
</div>

<div class="calculator">
  <div class="display">
    <button class="history-btn" onclick="toggleHistory()">⏱</button>
    <div class="expression" id="expression"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="separator"></div>

  <div class="sci-row">
    <button class="btn-sci" onclick="sciOp('sin')">sin</button>
    <button class="btn-sci" onclick="sciOp('cos')">cos</button>
    <button class="btn-sci" onclick="sciOp('sqrt')">√</button>
    <button class="btn-sci" onclick="sciOp('sq')">x²</button>
    <button class="btn-sci" onclick="sciOp('tan')">tan</button>
    <button class="btn-sci" onclick="sciOp('ln')">ln</button>
    <button class="btn-sci" onclick="insertConst('Math.PI')">π</button>
    <button class="btn-sci" onclick="insertConst('Math.E')">e</button>
  </div>

  <div class="keypad">
    <button class="btn btn-func" onclick="clearAll()">AC</button>
    <button class="btn btn-func" onclick="toggleSign()">+/−</button>
    <button class="btn btn-func" onclick="percent()">%</button>
    <button class="btn btn-op"  onclick="op('÷')">÷</button>
    <button class="btn btn-num" onclick="num('7')">7</button>
    <button class="btn btn-num" onclick="num('8')">8</button>
    <button class="btn btn-num" onclick="num('9')">9</button>
    <button class="btn btn-op"  onclick="op('×')">×</button>
    <button class="btn btn-num" onclick="num('4')">4</button>
    <button class="btn btn-num" onclick="num('5')">5</button>
    <button class="btn btn-num" onclick="num('6')">6</button>
    <button class="btn btn-op"  onclick="op('−')">−</button>
    <button class="btn btn-num" onclick="num('1')">1</button>
    <button class="btn btn-num" onclick="num('2')">2</button>
    <button class="btn btn-num" onclick="num('3')">3</button>
    <button class="btn btn-op"  onclick="op('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="num('0')">0</button>
    <button class="btn btn-num" onclick="decimal()">.</button>
    <button class="btn btn-eq"  onclick="equals()">=</button>
  </div>
</div>

<script>
  let display='0', expression='', operand1=null, operator=null;
  let waitingForOperand=false, justCalculated=false;
  let history=JSON.parse(localStorage.getItem('calc-history')||'[]');

  const resultEl=document.getElementById('result');
  const exprEl=document.getElementById('expression');

  function updateDisplay() {
    let val=display;
    if(!isNaN(val)&&val!==''&&!val.includes('Infinity')&&!val.includes('NaN')) {
      let parts=val.split('.');
      parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ');
      val=parts.join('.');
    }
    resultEl.textContent=val;
    resultEl.className='result';
    if(val.length>12) resultEl.classList.add('tiny');
    else if(val.length>8) resultEl.classList.add('small');
  }

  function num(n) {
    if(justCalculated){display=n;expression='';justCalculated=false;}
    else if(waitingForOperand){display=n;waitingForOperand=false;}
    else display=display==='0'?n:display+n;
    updateDisplay();
  }
  function decimal() {
    if(waitingForOperand){display='0.';waitingForOperand=false;}
    else if(!display.includes('.')) display+='.';
    updateDisplay();
  }
  function op(o) {
    const curr=parseFloat(display.replace(/ /g,''));
    if(operator&&!waitingForOperand){
      const r=calculate(operand1,curr,operator);
      display=String(r);operand1=r;
    } else operand1=curr;
    operator=o;
    expression=display+' '+o;
    waitingForOperand=true;justCalculated=false;
    exprEl.textContent=expression;updateDisplay();
  }
  function calculate(a,b,op) {
    const r={'+':a+b,'−':a-b,'×':a*b,'÷':b!==0?a/b:'Erreur'}[op];
    return typeof r==='number'?Math.round(r*1e10)/1e10:r;
  }
  function equals() {
    if(!operator||waitingForOperand) return;
    const curr=parseFloat(display.replace(/ /g,''));
    const expr=expression+' '+display+' =';
    const r=calculate(operand1,curr,operator);
    history.unshift({expr:expr,result:String(r)});
    if(history.length>50) history.pop();
    localStorage.setItem('calc-history',JSON.stringify(history));
    updateHistoryUI();
    exprEl.textContent=expr;
    display=String(r);operator=null;operand1=null;
    waitingForOperand=false;justCalculated=true;updateDisplay();
  }
  function clearAll(){
    display='0';expression='';operator=null;operand1=null;
    waitingForOperand=false;justCalculated=false;
    exprEl.textContent='';updateDisplay();
  }
  function toggleSign(){display=String(parseFloat(display.replace(/ /g,''))*-1);updateDisplay();}
  function percent(){display=String(parseFloat(display.replace(/ /g,''))/100);updateDisplay();}
  function sciOp(fn) {
    const val=parseFloat(display.replace(/ /g,''));
    const ops={
      sin:Math.round(Math.sin(val*Math.PI/180)*1e10)/1e10,
      cos:Math.round(Math.cos(val*Math.PI/180)*1e10)/1e10,
      tan:Math.round(Math.tan(val*Math.PI/180)*1e10)/1e10,
      ln:val>0?Math.round(Math.log(val)*1e10)/1e10:'Erreur',
      sqrt:val>=0?Math.round(Math.sqrt(val)*1e10)/1e10:'Erreur',
      sq:Math.round(val*val*1e10)/1e10
    };
    const r=ops[fn];
    const expr=fn+'('+val+') =';
    history.unshift({expr:expr,result:String(r)});
    if(history.length>50) history.pop();
    localStorage.setItem('calc-history',JSON.stringify(history));
    updateHistoryUI();
    display=String(r);
    exprEl.textContent=expr;
    justCalculated=true;operator=null;updateDisplay();
  }
  function insertConst(c){
    display=String(Math.round((c==='Math.PI'?Math.PI:Math.E)*1e10)/1e10);
    updateDisplay();
  }
  function toggleHistory(){
    document.getElementById('historyPanel').classList.toggle('open');
    updateHistoryUI();
  }
  function updateHistoryUI(){
    const list=document.getElementById('historyList');
    if(history.length===0){
      list.innerHTML='<div class="history-empty">Aucun calcul enregistré</div>';return;
    }
    list.innerHTML=history.map((h,i)=>`
      <div class="history-item" onclick="recallHistory(${i})">
        <div class="history-expr">${h.expr}</div>
        <div class="history-res">${h.result}</div>
      </div>`).join('');
  }
  function recallHistory(i){
    display=history[i].result;
    exprEl.textContent=history[i].expr;
    justCalculated=true;operator=null;
    updateDisplay();toggleHistory();
  }
  function clearHistory(){
    history=[];
    localStorage.setItem('calc-history','[]');
    updateHistoryUI();
  }
  updateDisplay();
</script>
</body>
</html>
